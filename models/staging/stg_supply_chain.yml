version: 2

models:
  - name: stg_supply_chain
    description: >
      Cleaned and renamed staging model built on top of raw_supply_chain.
      Grain is one row per order line item. order_item_id is the unique row key.
      order_id is not unique at this level.
    columns:
      - name: order_item_id
        description: "Primary key. One row per order line item."
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Order identifier. Not unique — one order can have multiple line items."
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: order_at
        description: "Timestamp when the order was placed."
        tests:
          - not_null

      - name: shipped_at
        description: "Timestamp when the order was shipped."
        tests:
          - not_null

      - name: actual_shipping_days
        description: "Number of days the shipment actually took."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

      - name: scheduled_shipping_days
        description: "Number of days the shipment was scheduled to take."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

      - name: shipping_mode
        tests:
          - not_null
          - accepted_values:
              values: ['First Class', 'Second Class', 'Same Day', 'Standard Class']

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['COMPLETE', 'PENDING', 'PENDING_PAYMENT', 'PROCESSING',
                       'PAYMENT_REVIEW', 'CANCELED', 'SUSPECTED_FRAUD',
                       'ON_HOLD', 'CLOSED']

      - name: sales_amount
        tests:
          - not_null

      - name: order_region
        tests:
          - not_null